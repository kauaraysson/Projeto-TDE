<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreviAr - Autenticação</title>
    
    <!-- Favicon usando sua logo oficial -->
    <link rel="icon" type="image/png" href="sun.png">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #4fc3f7;
            --primary-dark: #0288d1;
            --bg-dark: #0a0e14;
            --glass: rgba(255, 255, 255, 0.03);
            --error: #ff5252;
            --success: #4caf50;
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 70% 20%, rgba(79, 195, 247, 0.1) 0%, transparent 50%);
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            text-align: center;
            z-index: 10;
        }

        /* ==========================================
           1. MASCOTE SVG INTERATIVO (O SUNNY)
           ========================================== */
        .mascote-container {
            width: 140px; height: 140px;
            margin: 0 auto 30px;
            position: relative;
        }

        /* Animação de Raios Externos */
        .sun-rays {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            animation: rotateRays 15s linear infinite;
        }

        @keyframes rotateRays { 100% { transform: rotate(360deg); } }

        .sunny-svg { width: 100%; height: 100%; overflow: visible; }
        
        /* Face e Sorriso */
        .sun-face { fill: #FFD54F; filter: drop-shadow(0 0 15px rgba(255, 213, 79, 0.5)); }
        .sun-mouth { stroke: #333; stroke-width: 3; fill: none; stroke-linecap: round; }
        
        /* Olhos Reativos */
        .olho { fill: #333; transition: transform 0.2s ease-out; }
        .pupila { fill: #fff; }

        /* Braços (Escondendo os olhos) */
        .braco { 
            fill: #FFD54F; 
            stroke: #FBC02D; stroke-width: 1;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            transform: translateY(20px);
        }

        /* Estados das Animações */
        .look-at-email .olho { transform: translate(4px, 5px); }
        
        .covering-eyes .braco { opacity: 1; transform: translateY(0); }
        .covering-eyes .olho { opacity: 0; }
        
        .peeking-eyes .braco-left { transform: translate(-8px, -5px) rotate(-15deg); }
        .peeking-eyes .braco-right { transform: translate(8px, -5px) rotate(15deg); }
        .peeking-eyes .olho { opacity: 1; transform: scale(0.8); }

        /* ==========================================
           2. FORMULÁRIO E UX
           ========================================== */
        .brand-title { font-size: 36px; font-weight: 800; margin-bottom: 35px; letter-spacing: -1.5px; }
        .brand-title span { color: var(--primary); }

        .field { text-align: left; margin-bottom: 22px; position: relative; }
        .field label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        
        .input-group { position: relative; }
        .input-group input {
            width: 100%; padding: 16px 16px 16px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; color: #fff; font-size: 16px;
            transition: all 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.08); outline: none; box-shadow: 0 0 15px rgba(79, 195, 247, 0.2); }
        
        .icon { position: absolute; left: 16px; top: 17px; font-size: 18px; opacity: 0.4; }
        .btn-view { position: absolute; right: 16px; top: 17px; background: none; border: none; cursor: pointer; color: #fff; opacity: 0.5; font-size: 18px; }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; color: #fff; font-weight: 900; font-size: 16px;
            cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 25px rgba(2, 136, 209, 0.4);
            margin-top: 15px;
        }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(2, 136, 209, 0.6); }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }

        .switch-txt { margin-top: 25px; font-size: 14px; color: #b0bec5; }
        .switch-txt a { color: var(--primary); text-decoration: none; font-weight: bold; cursor: pointer; }

        .status-msg { 
            margin-top: 20px; padding: 14px; border-radius: 12px; font-size: 14px; 
            font-weight: 600; display: none; animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
        .error { background: rgba(255, 82, 82, 0.1); color: var(--error); border: 1px solid var(--error); }
        .success { background: rgba(76, 175, 80, 0.1); color: var(--success); border: 1px solid var(--success); }

    </style>
</head>
<body>

    <div class="login-card">
        
        <!-- Sunny 2.0: O Mascote Vetorial -->
        <div class="mascote-container" id="sunny-control">
            <div class="sun-rays">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" fill="none" stroke="#FFB74D" stroke-width="2" stroke-dasharray="8 8"/>
                </svg>
            </div>
            <svg class="sunny-svg" viewBox="0 0 100 100">
                <circle class="sun-face" cx="50" cy="50" r="35"/>
                <!-- Olhos -->
                <g class="olhos-group">
                    <circle id="olho-L" class="olho" cx="40" cy="45" r="4"/>
                    <circle id="olho-R" class="olho" cx="60" cy="45" r="4"/>
                </g>
                <path class="sun-mouth" d="M40 60 Q50 70 60 60"/>
                <!-- Braços (Mãos) -->
                <rect class="braco braco-left" x="25" y="35" width="22" height="25" rx="10"/>
                <rect class="braco braco-right" x="53" y="35" width="22" height="25" rx="10"/>
            </svg>
        </div>

        <h1 class="brand-title">PreviAr<span>.</span></h1>

        <div id="form-box">
            <div class="field">
                <label>Identificador de Acesso</label>
                <div class="input-group">
                    <span class="icon">📧</span>
                    <input type="email" id="email" placeholder="estudante@uniube.edu.br" onfocus="updateSunny('email')" onblur="updateSunny('reset')">
                </div>
            </div>

            <div class="field">
                <label>Chave de Segurança</label>
                <div class="input-group">
                    <span class="icon">🔒</span>
                    <input type="password" id="senha" placeholder="••••••••" onfocus="updateSunny('password')" onblur="updateSunny('reset')">
                    <button type="button" class="btn-view" onclick="togglePeek()">👁️</button>
                </div>
            </div>

            <button class="btn-main" id="btn-exec" onclick="handleAuth()">Acessar Monitoramento</button>

            <p class="switch-txt" id="toggle-area">
                Novo no PreviAr? <a onclick="toggleMode()">Criar conta de estudante</a>
            </p>

            <div id="feedback" class="status-msg"></div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES DE ELITE
        const SUPABASE_URL = "https://axtvfilbscsnbhtkgjyh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-xvSt9oDNcXTfb69gfsdnQ_k8BxD8KI";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isSignupMode = false;

        // ==========================================
        // MOTOR DE ANIMAÇÃO DO MASCOTE
        // ==========================================
        function updateSunny(state) {
            const container = document.getElementById('sunny-control');
            container.classList.remove('look-at-email', 'covering-eyes', 'peeking-eyes');

            if (state === 'email') container.classList.add('look-at-email');
            if (state === 'password') {
                const isVisible = document.getElementById('senha').type === 'text';
                container.classList.add(isVisible ? 'peeking-eyes' : 'covering-eyes');
            }
        }

        function togglePeek() {
            const input = document.getElementById('senha');
            input.type = (input.type === 'password') ? 'text' : 'password';
            if (document.activeElement === input) updateSunny('password');
        }

        // ==========================================
        // LÓGICA DE IHM E UX
        // ==========================================
        function toggleMode() {
            isSignupMode = !isSignupMode;
            const btn = document.getElementById('btn-exec');
            const txt = document.getElementById('toggle-area');
            
            btn.innerText = isSignupMode ? "Finalizar Cadastro" : "Acessar Monitoramento";
            txt.innerHTML = isSignupMode ? 
                "Já tem acesso? <a onclick='toggleMode()'>Fazer Login</a>" : 
                "Novo no PreviAr? <a onclick='toggleMode()'>Criar conta de estudante</a>";
        }

        function notify(text, type) {
            const box = document.getElementById('feedback');
            box.innerText = text;
            box.style.display = 'block';
            box.className = `status-msg ${type}`;
        }

        // ==========================================
        // INTEGRAÇÃO SUPABASE
        // ==========================================
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;
            const btn = document.getElementById('btn-exec');

            if (!email || !password) {
                notify("⚠️ Preencha os campos para validar o acesso.", "error");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando...";

            if (isSignupMode) {
                const { error } = await supabase.auth.signUp({ email, password });
                if (error) notify("❌ Erro: " + error.message, "error");
                else notify("✅ Verifique seu e-mail para confirmar a conta!", "success");
            } else {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) notify("❌ Credenciais inválidas. Tente novamente.", "error");
                else {
                    notify("🚀 Acesso concedido! Sincronizando dados...", "success");
                    setTimeout(() => { alert("Login realizado com sucesso! Agora vamos preparar sua Dashboard."); }, 1000);
                }
            }
            btn.disabled = false;
            btn.innerText = isSignupMode ? "Finalizar Cadastro" : "Acessar Monitoramento";
        }
    </script>
</body>
</html>
