<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PreviAr - Faça seu Login</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ==========================================
           1. ESTILO LOGIN PREMIUM (Referência)
           ========================================== */
        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            color: #fff; 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* Divisão da tela: Esquerda (Form) / Direita (Imagem) */
        .login-wrapper { 
            display: flex; 
            width: 100%; 
            height: 100%; 
        }

        .login-side { 
            width: 50%; 
            padding: 60px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            background: #000; 
            z-index: 2;
        }

        .image-side { 
            width: 50%; 
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1350&q=80') no-repeat center center; 
            background-size: cover; 
            position: relative;
        }

        .image-side::before {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #000, transparent);
        }

        /* ==========================================
           2. O SOLZINHO ANIMADO (Mascote UX)
           ========================================== */
        .mascote-container {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            position: relative;
            align-self: flex-start;
        }

        .sol-face {
            width: 80px; height: 80px;
            background: #FFD700;
            border-radius: 50%;
            position: absolute;
            top: 20px; left: 20px;
            box-shadow: 0 0 30px #FF8C00;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.5s ease;
        }

        .olhos { display: flex; gap: 15px; transition: 0.3s; }
        .olho { width: 10px; height: 10px; background: #333; border-radius: 50%; }
        .boca { 
            position: absolute; bottom: 20px; 
            width: 20px; height: 10px; 
            border-bottom: 3px solid #333; 
            border-radius: 0 0 10px 10px; 
        }

        /* Braços (Escondendo os olhos) */
        .bracos {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; pointer-events: none;
        }
        .braco {
            width: 30px; height: 30px; background: #FFD700; border-radius: 10px;
            position: absolute; top: 45px; transition: 0.5s; opacity: 0;
        }
        .braco-esq { left: 5px; transform: rotate(-45deg); }
        .braco-dir { right: 5px; transform: rotate(45deg); }

        /* Estados da Animação */
        .olhando-baixo .olhos { transform: translateY(5px); }
        .escondido .braco { opacity: 1; transform: translateY(-15px) rotate(0deg); }
        .escondido .olhos { opacity: 0; }
        .fresta .braco-esq { transform: translateY(-15px) translateX(-5px) rotate(-20deg); }
        .fresta .olhos { opacity: 1; transform: scale(0.7); }

        /* ==========================================
           3. FORMULÁRIO E INPUTS
           ========================================== */
        h1 { font-size: 48px; margin-bottom: 40px; font-weight: bold; }
        h1 span { color: #A855F7; }

        .input-group { margin-bottom: 25px; position: relative; max-width: 400px; }
        .input-group label { display: block; margin-bottom: 10px; color: #999; font-size: 14px; }
        
        .input-field {
            width: 100%; padding: 15px; padding-left: 45px;
            background: #111; border: 1px solid #222;
            border-radius: 8px; color: #fff; font-size: 16px;
            outline: none; transition: 0.3s;
        }
        .input-field:focus { border-color: #A855F7; background: #181818; }

        .icon-field { position: absolute; left: 15px; top: 43px; color: #444; }

        .links-aux { display: flex; justify-content: flex-end; max-width: 400px; margin-bottom: 30px; }
        .links-aux a { color: #666; text-decoration: none; font-size: 13px; }
        .links-aux a:hover { color: #A855F7; }

        .btn-entrar {
            width: 100%; max-width: 400px; padding: 16px;
            background: linear-gradient(90deg, #6366F1, #A855F7, #EC4899);
            border: none; border-radius: 12px;
            color: #fff; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-entrar:hover { transform: scale(1.02); filter: brightness(1.1); }

        .footer-link { text-align: center; max-width: 400px; margin-top: 20px; color: #666; font-size: 14px; }
        .footer-link a { color: #A855F7; text-decoration: none; font-weight: bold; }

        #msg-feedback { 
            max-width: 400px; padding: 15px; border-radius: 8px; 
            margin-top: 20px; display: none; font-size: 14px; text-align: center;
        }
        .erro { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .sucesso { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }

        /* Mobile Adjust */
        @media (max-width: 768px) {
            .image-side { display: none; }
            .login-side { width: 100%; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-side">
            
            <!-- Mascote Interativo -->
            <div class="mascote-container" id="sol-mascote">
                <div class="sol-face" id="sol-face">
                    <div class="olhos">
                        <div class="olho"></div>
                        <div class="olho"></div>
                    </div>
                    <div class="boca"></div>
                </div>
                <div class="bracos">
                    <div class="braco braco-esq"></div>
                    <div class="braco braco-dir"></div>
                </div>
            </div>

            <h1>Faça seu login<span>.</span></h1>

            <div id="form-login">
                <div class="input-group">
                    <label>E-mail</label>
                    <span class="icon-field">✉</span>
                    <input type="email" id="email" class="input-field" placeholder="seu@email.com" onfocus="animarSol('olhar')" onblur="animarSol('normal')">
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <span class="icon-field">🔒</span>
                    <input type="password" id="senha" class="input-field" placeholder="••••••••" onfocus="animarSol('esconder')" onblur="animarSol('normal')">
                    <button onclick="toggleSenha()" style="position:absolute; right:15px; top:43px; background:none; border:none; color:#444; cursor:pointer;">👁️</button>
                </div>

                <div class="links-aux">
                    <a href="#" onclick="alert('Funcionalidade em desenvolvimento no Supabase...')">Esqueci minha senha</a>
                </div>

                <button class="btn-entrar" id="btn-acao" onclick="executarLogin()">Entrar</button>

                <div class="footer-link">
                    Ainda não tenho uma conta? <a href="#" onclick="trocarModo()">Criar agora</a>
                </div>

                <div id="msg-feedback"></div>
            </div>
        </div>

        <div class="image-side"></div>
    </div>

    <!-- O RESTANTE DO APP (ESTRUTURA) -->
    <div id="app-content" style="display:none; padding:50px;">
        <h1>Bem-vindo ao Painel Real!</h1>
        <button onclick="location.reload()">Sair</button>
    </div>

    <script>
        // Configurações do Supabase
        const SUPABASE_URL = "https://axtvfilbscsnbhtkgjyh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_-xvSt9oDNcXTfb69gfsdnQ_k8BxD8KI";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let modoCadastro = false;

        // 1. ANIMAÇÕES DO SOLZINHO
        function animarSol(estado) {
            const mascote = document.getElementById('sol-mascote');
            mascote.classList.remove('olhando-baixo', 'escondido', 'fresta');

            if(estado === 'olhar') mascote.classList.add('olhando-baixo');
            if(estado === 'esconder') {
                const isVisivel = document.getElementById('senha').type === 'text';
                mascote.classList.add(isVisivel ? 'fresta' : 'escondido');
            }
        }

        function toggleSenha() {
            const campo = document.getElementById('senha');
            campo.type = (campo.type === 'password') ? 'text' : 'password';
            if(document.activeElement === campo) animarSol('esconder');
        }

        // 2. LÓGICA DE INTERFACE
        function trocarModo() {
            modoCadastro = !modoCadastro;
            document.querySelector('h1').innerHTML = modoCadastro ? "Crie sua conta<span>.</span>" : "Faça seu login<span>.</span>";
            document.getElementById('btn-acao').innerText = modoCadastro ? "Cadastrar" : "Entrar";
            document.querySelector('.footer-link').innerHTML = modoCadastro ? 
                "Já tem conta? <a href='#' onclick='trocarModo()'>Fazer login</a>" : 
                "Ainda não tenho uma conta? <a href='#' onclick='trocarModo()'>Criar agora</a>";
        }

        function mostrarMensagem(texto, tipo) {
            const box = document.getElementById('msg-feedback');
            box.innerText = texto;
            box.style.display = 'block';
            box.className = tipo; // 'erro' ou 'sucesso'
        }

        // 3. COMUNICAÇÃO COM O SUPABASE
        async function executarLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btn-acao');

            if(!email || !senha) {
                mostrarMensagem("⚠️ Por favor, preencha todos os campos.", "erro");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando...";

            if(modoCadastro) {
                // Lógica de Cadastro
                const { data, error } = await supabase.auth.signUp({ email, password: senha });
                if(error) {
                    mostrarMensagem("❌ Erro ao cadastrar: " + error.message, "erro");
                } else {
                    mostrarMensagem("✅ Sucesso! Verifique seu e-mail para confirmar.", "sucesso");
                }
            } else {
                // Lógica de Login
                const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });
                if(error) {
                    mostrarMensagem("❌ Acesso negado: " + error.message, "erro");
                } else {
                    mostrarMensagem("🚀 Autenticado! Redirecionando...", "sucesso");
                    setTimeout(() => {
                        document.querySelector('.login-wrapper').style.display = 'none';
                        document.getElementById('app-content').style.display = 'block';
                    }, 1500);
                }
            }
            btn.disabled = false;
            btn.innerText = modoCadastro ? "Cadastrar" : "Entrar";
        }
    </script>
</body>
</html>
