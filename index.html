<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreviAr - Login de Elite</title>
    <link rel="icon" type="image/png" href="sun.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #4fc3f7; --dark: #050a0f; --yellow: #FFD54F; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        body { background: var(--dark); color: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* LAYOUT DIVIDIDO */
        .wrapper { display: flex; width: 100%; height: 100%; }

        /* LADO ESQUERDO: O MASCOTE (O REAL) */
        .mascote-side { 
            width: 45%; background: radial-gradient(circle at center, #0a1520 0%, #050a0f 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-right: 1px solid rgba(255,255,255,0.05); position: relative;
        }

        /* LADO DIREITO: O FORMULÁRIO */
        .form-side { width: 55%; padding: 60px; display: flex; flex-direction: column; justify-content: center; }

        /* O PERSONAGEM SUNNY (SVG) */
        .sunny-box { width: 300px; height: 350px; position: relative; }
        .sunny-svg { width: 100%; height: 100%; overflow: visible; }
        
        /* Animações Contínuas */
        .corpo-sol { fill: var(--yellow); filter: drop-shadow(0 0 30px rgba(255, 213, 79, 0.4)); animation: flutuar 3s ease-in-out infinite; }
        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .raios { transform-origin: center; animation: girar 20s linear infinite; }
        @keyframes girar { 100% { transform: rotate(360deg); } }

        /* Membros e Face */
        .olho { fill: #2c3e50; transition: 0.3s; }
        .braco, .perna { fill: var(--yellow); stroke: #FBC02D; stroke-width: 2; transition: 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .boca { stroke: #2c3e50; stroke-width: 3; fill: none; stroke-linecap: round; transition: 0.3s; }

        /* ESTADOS DE ANIMAÇÃO DO PERSONAGEM */
        /* 1. Olhando para o E-mail */
        .modo-email .olho { transform: translate(5px, 8px); }
        
        /* 2. Surpresa e Tapando os Olhos (Senha) */
        .modo-senha .braco-esq { transform: translate(35px, -60px) rotate(40deg); }
        .modo-senha .braco-dir { transform: translate(-35px, -60px) rotate(-40deg); }
        .modo-senha .olho { opacity: 0; }
        .modo-senha .boca { d: path("M40 75 Q50 75 60 75"); } /* Boca de surpresa/reta */

        /* 3. Espreitando (Ver Senha) */
        .modo-espreitar .braco-esq { transform: translate(20px, -60px) rotate(20deg); }
        .modo-espreitar .braco-dir { transform: translate(-20px, -60px) rotate(-20deg); }
        .modo-espreitar .olho { opacity: 1; transform: scale(0.7) translateY(-5px); }

        /* FORMULÁRIO */
        h1 { font-size: 42px; margin-bottom: 10px; }
        h1 span { color: var(--blue); }
        .subtitle { color: #666; margin-bottom: 40px; }
        
        .campo { margin-bottom: 25px; max-width: 450px; }
        .campo label { display: block; font-size: 12px; font-weight: 800; color: var(--blue); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-wrap { position: relative; }
        .input-wrap input { width: 100%; padding: 18px 18px 18px 50px; background: #111; border: 1px solid #222; border-radius: 15px; color: #fff; font-size: 16px; outline: none; transition: 0.3s; }
        .input-wrap input:focus { border-color: var(--blue); background: #151515; }
        .input-wrap i { position: absolute; left: 18px; top: 20px; opacity: 0.3; }

        .btn-entrar { width: 100%; max-width: 450px; padding: 20px; border-radius: 15px; background: linear-gradient(90deg, #4fc3f7, #0288d1); border: none; color: #fff; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(2, 136, 209, 0.3); }
        .btn-entrar:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(2, 136, 209, 0.5); }

        .feedback { margin-top: 20px; max-width: 450px; padding: 15px; border-radius: 10px; display: none; font-size: 14px; font-weight: bold; }
        .erro { background: rgba(255, 82, 82, 0.1); color: #ff5252; border: 1px solid #ff5252; }
        .sucesso { background: rgba(76, 175, 80, 0.1); color: #4CAF50; border: 1px solid #4CAF50; }

        @media (max-width: 900px) { .mascote-side { display: none; } .form-side { width: 100%; padding: 30px; } }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="mascote-side" id="lado-mascote">
            <div class="sunny-box" id="sunny-box">
                <svg class="sunny-svg" viewBox="0 0 100 120">
                    <!-- Raios Girando -->
                    <g class="raios">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#FFB74D" stroke-width="2" stroke-dasharray="10 5"/>
                    </g>
                    <!-- Pernas -->
                    <rect class="perna" x="40" y="85" width="6" height="20" rx="3"/>
                    <rect class="perna" x="54" y="85" width="6" height="20" rx="3"/>
                    <!-- Corpo -->
                    <circle class="corpo-sol" cx="50" cy="50" r="38"/>
                    <!-- Braços -->
                    <rect class="braco braco-esq" x="5" y="45" width="25" height="8" rx="4"/>
                    <rect class="braco braco-dir" x="70" y="45" width="25" height="8" rx="4"/>
                    <!-- Rosto -->
                    <circle class="olho" cx="40" cy="45" r="4"/>
                    <circle class="olho" cx="60" cy="45" r="4"/>
                    <path class="boca" id="boca-svg" d="M40 65 Q50 75 60 65"/>
                </svg>
            </div>
            <p style="color: #666; font-size: 12px; margin-top: 20px;">SEU GUARDIÃO AMBIENTAL</p>
        </div>

        <div class="form-side">
            <h1 id="titulo-form">Bem-vindo<span>.</span></h1>
            <p class="subtitle" id="sub-form">Acesse o painel preditivo do PreviAr</p>

            <div class="campo">
                <label>Identificação (E-mail)</label>
                <div class="input-wrap">
                    <i>📧</i>
                    <input type="email" id="email" placeholder="nome@exemplo.com" onfocus="reagir('email')" onblur="reagir('reset')">
                </div>
            </div>

            <div class="campo">
                <label>Chave de Acesso</label>
                <div class="input-wrap">
                    <i>🔒</i>
                    <input type="password" id="senha" placeholder="••••••••" onfocus="reagir('senha')" onblur="reagir('reset')">
                    <button onclick="espiar()" style="position:absolute; right:15px; top:18px; background:none; border:none; color:#444; cursor:pointer;">👁️</button>
                </div>
            </div>

            <button class="btn-entrar" id="btn-master" onclick="autenticar()">Entrar no Monitoramento</button>

            <div style="margin-top:25px; font-size:14px; color:#666;">
                <span id="footer-txt">Novo por aqui?</span> 
                <a href="#" onclick="mudarModo()" style="color:var(--blue); text-decoration:none; font-weight:bold;" id="footer-link">Criar conta agora</a>
            </div>

            <div id="status" class="feedback"></div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES SUPABASE
        const SUPABASE_URL = "COLE_SUA_URL_AQUI";
        const SUPABASE_KEY = "COLE_SUA_CHAVE_AQUI";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let modoCadastro = false;

        // 1. REAÇÕES DO SUNNY (O PERSONAGEM)
        function reagir(acao) {
            const mascote = document.getElementById('sunny-box');
            mascote.classList.remove('modo-email', 'modo-senha', 'modo-espreitar');

            if(acao === 'email') mascote.classList.add('modo-email');
            if(acao === 'senha') {
                const ver = document.getElementById('senha').type === 'text';
                mascote.classList.add(ver ? 'modo-espreitar' : 'modo-senha');
            }
        }

        function espiar() {
            const input = document.getElementById('senha');
            input.type = (input.type === 'password') ? 'text' : 'password';
            if(document.activeElement === input) reagir('senha');
        }

        // 2. LÓGICA DE IHM
        function mudarModo() {
            modoCadastro = !modoCadastro;
            document.getElementById('titulo-form').innerHTML = modoCadastro ? "Nova Conta<span>.</span>" : "Bem-vindo<span>.</span>";
            document.getElementById('btn-master').innerText = modoCadastro ? "Finalizar Cadastro" : "Entrar no Monitoramento";
            document.getElementById('footer-txt').innerText = modoCadastro ? "Já tem acesso?" : "Novo por aqui?";
            document.getElementById('footer-link').innerText = modoCadastro ? "Fazer Login" : "Criar conta agora";
        }

        function avisar(txt, tipo) {
            const s = document.getElementById('status');
            s.innerText = txt; s.style.display = 'block'; s.className = `feedback ${tipo}`;
        }

        // 3. COMUNICAÇÃO REAL COM SUPABASE
        async function autenticar() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('senha').value;
            const btn = document.getElementById('btn-master');

            if(!email || !password) { avisar("⚠️ Preencha todos os campos.", "erro"); return; }
            
            btn.disabled = true; btn.innerText = "Processando...";

            if(modoCadastro) {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if(error) avisar("❌ " + error.message, "erro");
                else avisar("✅ Conta criada! Verifique seu e-mail ou faça login.", "sucesso");
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if(error) avisar("❌ Acesso negado. Verifique os dados.", "erro");
                else {
                    avisar("🚀 Autorizado! Entrando...", "sucesso");
                    setTimeout(() => { alert("Login OK! Próximo passo: Sua Dashboard Pro."); }, 1000);
                }
            }
            btn.disabled = false;
            btn.innerText = modoCadastro ? "Finalizar Cadastro" : "Entrar no Monitoramento";
        }
    </script>
</body>
</html>
